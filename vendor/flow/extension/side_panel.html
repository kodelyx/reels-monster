<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>Flow Agent</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0e1016;
      --surface: #161922;
      --card: rgba(255, 255, 255, 0.04);
      --card-hover: rgba(255, 255, 255, 0.08);
      --border: rgba(255, 255, 255, 0.09);
      --border-glow: rgba(255, 55, 95, 0.3);
      --accent: #ff375f;
      --accent-soft: #ff5e82;
      --accent-bg: rgba(255, 55, 95, 0.06);
      --accent-glow: rgba(255, 55, 95, 0.25);
      --green: #34c759;
      --green-bg: rgba(52, 199, 89, 0.14);
      --red: #ff3b30;
      --red-bg: rgba(255, 59, 48, 0.14);
      --yellow: #ffcc00;
      --yellow-bg: rgba(255, 204, 0, 0.14);
      --cyan: #ff375f;
      --text: #e8eaed;
      --text-dim: #a8b0bd;
      --muted: #6b7385;
      --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --mono: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      --radius: 12px;
      --radius-sm: 6px;
    }

    html,
    body {
      height: 100%;
      margin: 0;
    }

    body {
      width: 100%;
      min-width: 280px;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      line-height: 1.5;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ─────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px 12px;
      background: linear-gradient(180deg, rgba(255, 55, 95, 0.06) 0%, var(--surface) 100%);
      border-bottom: 1px solid var(--border);
      position: relative;
    }

    header::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 16px;
      right: 16px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent-glow), transparent);
    }

    header img {
      mix-blend-mode: normal !important;
    }

    .logo {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), var(--accent-soft));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 14px;
      color: #fff;
      box-shadow: 0 2px 8px rgba(255, 55, 95, 0.3);
      flex-shrink: 0;
    }

    .header-info {
      flex: 1;
    }

    .header-title {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--text);
    }

    .header-sub {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.03em;
    }

    /* Connection dot */
    #conn-pill {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 5px;
      flex-shrink: 0;
    }

    #conn-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--muted);
      transition: all 0.4s ease;
      flex-shrink: 0;
    }

    #conn-dot.on {
      background: var(--green);
      box-shadow: 0 0 8px 2px rgba(16, 185, 129, 0.4);
      animation: pulse-glow 2.5s ease-in-out infinite;
    }

    @keyframes pulse-glow {

      0%,
      100% {
        box-shadow: 0 0 6px 1px rgba(16, 185, 129, 0.3);
      }

      50% {
        box-shadow: 0 0 14px 4px rgba(16, 185, 129, 0.15);
      }
    }

    /* Toggle */
    .toggle-wrap {
      display: flex;
      align-items: center;
      gap: 7px;
      flex-shrink: 0;
    }

    .toggle-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
      cursor: pointer;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-track {
      position: absolute;
      inset: 0;
      background: var(--border);
      border-radius: 10px;
      transition: background 0.3s ease;
    }

    .toggle-thumb {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--muted);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .toggle input:checked~.toggle-track {
      background: var(--accent);
      box-shadow: 0 0 12px rgba(255, 55, 95, 0.3);
    }

    .toggle input:checked~.toggle-thumb {
      transform: translateX(16px);
      background: #fff;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.15);
    }

    /* ── Metrics ─────────────────────────────────── */
    .metrics {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      padding: 12px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .metric-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 10px 10px;
      text-align: center;
      transition: all 0.2s ease;
    }

    .metric-card:hover {
      border-color: var(--border-glow);
      background: var(--card-hover);
    }

    .metric-value {
      font-size: 26px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.03em;
      color: var(--text);
      margin-bottom: 4px;
      font-variant-numeric: tabular-nums;
      transition: transform 0.18s ease;
    }

    .metric-value.bump {
      transform: scale(1.18);
    }

    .metric-value.green {
      color: var(--green);
    }

    .metric-value.red {
      color: var(--red);
    }

    .metric-label {
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
    }

    /* ── Activity strip ─────────────────────────────── */
    #activity {
      padding: 10px 16px 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .activity-top {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    #activity-orb {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
    }

    #activity-state {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--text);
    }

    #activity-ticker {
      margin-left: auto;
      font-size: 10px;
      font-weight: 500;
      font-variant-numeric: tabular-nums;
      color: var(--muted);
    }

    .activity-bar {
      position: relative;
      height: 6px;
      border-radius: 3px;
      background: var(--border);
      overflow: hidden;
    }

    .activity-fill {
      position: absolute;
      inset: 0;
      border-radius: 3px;
      background: transparent;
    }

    /* OFF — dead, no motion */
    #activity[data-state="off"] #activity-orb {
      background: var(--muted);
    }

    #activity[data-state="off"] .activity-fill {
      background: transparent;
    }

    /* IDLE — calm green breathing */
    #activity[data-state="idle"] #activity-orb {
      background: var(--green);
      animation: orb-breathe 2.6s ease-in-out infinite;
    }

    #activity[data-state="idle"] .activity-fill {
      background: linear-gradient(90deg, transparent, var(--green), transparent);
      animation: breathe 3s ease-in-out infinite;
    }

    /* RUNNING — energetic accent scan */
    #activity[data-state="running"] #activity-orb {
      background: var(--accent);
      animation: orb-breathe 0.9s ease-in-out infinite;
    }

    #activity[data-state="running"] .activity-fill {
      width: 35%;
      background: linear-gradient(90deg, transparent, var(--accent), var(--accent-soft), transparent);
      animation: scan 1.1s linear infinite;
    }

    @keyframes breathe {

      0%,
      100% {
        opacity: 0.25;
      }

      50% {
        opacity: 0.8;
      }
    }

    @keyframes orb-breathe {

      0%,
      100% {
        opacity: 1;
        box-shadow: 0 0 0 0 rgba(255, 55, 95, 0.35);
      }

      50% {
        opacity: 0.55;
        box-shadow: 0 0 10px 3px rgba(255, 55, 95, 0.18);
      }
    }

    @keyframes scan {
      from {
        transform: translateX(-120%);
      }

      to {
        transform: translateX(320%);
      }
    }

    /* ── Token line ─────────────────────────────────── */
    .token-line {
      display: flex;
      align-items: center;
      padding: 7px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    #token-status {
      font-size: 10px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    #token-status::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      display: inline-block;
    }

    #token-status.ok {
      color: var(--green);
    }

    #token-status.ok::before {
      background: var(--green);
    }

    #token-status.bad {
      color: var(--red);
    }

    #token-status.bad::before {
      background: var(--red);
    }

    #token-status.warn {
      color: var(--yellow);
    }

    #token-status.warn::before {
      background: var(--yellow);
    }

    /* ── Log section ─────────────────────────────── */
    .log-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .log-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px 8px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .log-header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #log-count {
      background: var(--accent-bg);
      border: 1px solid rgba(255, 55, 95, 0.15);
      border-radius: 10px;
      padding: 1px 8px;
      font-size: 10px;
      font-weight: 700;
      color: var(--accent-soft);
    }

    .live-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      border-radius: 10px;
      padding: 1px 8px;
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #fff;
      background: linear-gradient(135deg, var(--accent), var(--accent-soft));
      box-shadow: 0 0 0 0 var(--accent-glow);
      animation: pill-pulse 1.2s ease-in-out infinite;
    }

    .live-pill[hidden] {
      display: none;
    }

    .live-pill::before {
      content: '';
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #fff;
    }

    @keyframes pill-pulse {

      0%,
      100% {
        box-shadow: 0 0 0 0 rgba(255, 55, 95, 0.4);
      }

      50% {
        box-shadow: 0 0 8px 3px rgba(255, 55, 95, 0.15);
      }
    }

    .log-table-wrap {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .log-table-wrap::-webkit-scrollbar {
      width: 5px;
    }

    .log-table-wrap::-webkit-scrollbar-track {
      background: transparent;
    }

    .log-table-wrap::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    .log-table-wrap::-webkit-scrollbar-thumb:hover {
      background: var(--border-glow);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      position: sticky;
      top: 0;
      padding: 7px 12px;
      text-align: left;
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      z-index: 1;
    }

    thead th:first-child {
      width: 60px;
    }

    thead th:last-child {
      width: 36%;
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: all 0.15s ease;
    }

    tbody tr:hover {
      background: var(--accent-bg);
    }

    tbody td {
      padding: 7px 12px;
      vertical-align: middle;
      white-space: nowrap;
    }

    .td-id {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--accent-soft);
      font-variant-numeric: tabular-nums;
      cursor: pointer;
      transition: color 0.15s;
    }

    .td-id:hover {
      color: var(--accent);
      text-decoration: underline;
    }

    .td-type {
      font-family: var(--font);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: var(--text);
    }

    .td-time {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
      font-variant-numeric: tabular-nums;
    }

    /* Status badges */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.03em;
    }

    .badge-ok {
      background: var(--green-bg);
      color: var(--green);
    }

    .badge-fail {
      background: var(--red-bg);
      color: var(--red);
    }

    .badge-proc {
      background: var(--yellow-bg);
      color: var(--yellow);
    }

    tbody tr.inflight {
      position: relative;
      background: var(--accent-bg);
    }

    tbody tr.inflight::after {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(90deg, transparent, rgba(255, 55, 95, 0.12), transparent);
      animation: row-shimmer 1.4s linear infinite;
    }

    tbody tr.inflight .badge-proc {
      animation: badge-blink 1s ease-in-out infinite;
    }

    @keyframes row-shimmer {
      from {
        transform: translateX(-100%);
      }

      to {
        transform: translateX(100%);
      }
    }

    @keyframes badge-blink {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.45;
      }
    }

    .td-error {
      max-width: 120px;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 10px;
      color: var(--red);
      cursor: default;
    }

    .td-error.empty {
      color: var(--muted);
    }

    .log-empty {
      padding: 32px 16px;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.02em;
    }

    .log-empty::before {
      content: '📋';
      display: block;
      font-size: 24px;
      margin-bottom: 8px;
      opacity: 0.6;
    }

    /* ── Detail overlay ─────────────────────────── */
    .detail-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(4px);
      z-index: 100;
    }

    .detail-overlay.open {
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    .detail-panel {
      width: 92%;
      max-height: 80vh;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    .detail-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      font-weight: 700;
      color: var(--accent-soft);
    }

    .detail-close {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      cursor: pointer;
      font-size: 14px;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .detail-close:hover {
      color: var(--text);
      background: var(--card-hover);
      border-color: var(--border-glow);
    }

    .detail-body {
      padding: 14px 16px;
      overflow-y: auto;
      font-size: 11px;
      line-height: 1.6;
      max-height: 65vh;
    }

    .detail-row {
      display: flex;
      gap: 10px;
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
    }

    .detail-label {
      width: 90px;
      flex-shrink: 0;
      color: var(--muted);
      font-weight: 600;
      text-transform: uppercase;
      font-size: 9px;
      letter-spacing: 0.06em;
    }

    .detail-value {
      flex: 1;
      word-break: break-all;
      color: var(--text);
      font-family: var(--mono);
      font-size: 10px;
    }

    .detail-value.error {
      color: var(--red);
    }

    .detail-value.ok {
      color: var(--green);
    }

    /* ── Action buttons ─────────────────────────── */
    .actions {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }

    .btn {
      flex: 1;
      padding: 9px 12px;
      font-family: var(--font);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.02em;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface);
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn:hover {
      background: var(--card-hover);
      border-color: var(--accent-soft);
      color: var(--text);
      transform: translateY(-1px);
    }

    .btn:active {
      transform: translateY(0);
      opacity: 0.8;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: default;
      transform: none;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-soft));
      border-color: transparent;
      color: #fff;
      box-shadow: 0 2px 8px rgba(255, 55, 95, 0.25);
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, var(--accent-soft), var(--accent));
      border-color: transparent;
      color: #fff;
      box-shadow: 0 4px 14px rgba(255, 55, 95, 0.35);
    }

    /* ── Signature ──────────────────────────────── */
    .signature {
      padding: 10px 16px;
      text-align: center;
      font-size: 10px;
      letter-spacing: 0.04em;
      color: var(--muted);
      background: var(--bg);
      border-top: 1px solid var(--border);
    }

    .signature a {
      color: var(--accent-soft);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.15s;
    }

    .signature a:hover {
      color: var(--text);
    }

    /* ── Animations ──────────────────────────────── */
    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(6px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .metric-card {
      animation: slideUp 0.3s ease forwards;
    }

    .metric-card:nth-child(2) {
      animation-delay: 0.05s;
    }

    .metric-card:nth-child(3) {
      animation-delay: 0.1s;
    }

    /* ── Toasts ──────────────────────────────────── */
    #toast-wrap {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: 12px;
      z-index: 200;
      display: flex;
      flex-direction: column;
      gap: 6px;
      pointer-events: none;
    }

    .toast {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      border-radius: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
      font-size: 11px;
      font-weight: 600;
      color: var(--text);
      animation: toast-in 0.22s ease;
    }

    .toast.hide {
      animation: toast-out 0.2s ease forwards;
    }

    .toast::before {
      content: '';
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
      background: var(--muted);
    }

    .toast.ok::before {
      background: var(--green);
    }

    .toast.err::before {
      background: var(--red);
    }

    .toast.info::before {
      background: var(--accent);
    }

    @keyframes toast-in {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes toast-out {
      to {
        opacity: 0;
        transform: translateY(8px);
      }
    }

    /* ── Reduced motion ──────────────────────────── */
    @media (prefers-reduced-motion: reduce) {

      .activity-fill,
      #activity-orb,
      #conn-dot.on,
      .live-pill,
      tbody tr.inflight::after,
      tbody tr.inflight .badge-proc {
        animation: none !important;
      }
    }
  </style>
</head>

<body>

  <!-- Header -->
  <header>
    <div style="width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; overflow: visible; flex-shrink: 0; margin-right: 4px;">
      <img src="icon48.png" style="width: 100%; height: 100%; object-fit: contain; transform: scale(1.6);">
    </div>
    <div class="header-info">
      <div class="header-title">Flow Agent</div>
      <div class="header-sub">Generate images &amp; videos on autopilot</div>
    </div>
    <div id="conn-pill" title="Connection">
      <span id="conn-dot"></span>
    </div>
    <div class="toggle-wrap">
      <span class="toggle-label" id="toggle-label">OFF</span>
      <label class="toggle">
        <input type="checkbox" id="main-toggle">
        <span class="toggle-track"></span>
        <span class="toggle-thumb"></span>
      </label>
    </div>
  </header>

  <!-- Metrics -->
  <div class="metrics">
    <div class="metric-card">
      <div class="metric-value" id="m-total">0</div>
      <div class="metric-label">Total</div>
    </div>
    <div class="metric-card">
      <div class="metric-value green" id="m-success">0</div>
      <div class="metric-label">Success</div>
    </div>
    <div class="metric-card">
      <div class="metric-value red" id="m-failed">0</div>
      <div class="metric-label">Failed</div>
    </div>
  </div>

  <!-- Activity strip -->
  <section id="activity" data-state="off">
    <div class="activity-top">
      <span id="activity-orb"></span>
      <span id="activity-state">Off</span>
      <span id="activity-ticker"></span>
    </div>
    <div class="activity-bar">
      <span class="activity-fill"></span>
    </div>
  </section>

  <!-- Token line -->
  <div class="token-line">
    <span id="token-status" class="bad">no token</span>
  </div>

  <!-- Request log -->
  <div class="log-section">
    <div class="log-header">
      <span>Request Log</span>
      <span class="log-header-right">
        <span id="live-count" class="live-pill" hidden>0 live</span>
        <span id="log-count">0</span>
      </span>
    </div>

    <div class="log-table-wrap">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Type</th>
            <th>Time</th>
            <th>Status</th>
            <th>Error</th>
          </tr>
        </thead>
        <tbody id="log-body">
          <tr>
            <td colspan="5" class="log-empty">No requests yet</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Actions -->
  <div class="actions">
    <button class="btn btn-primary" id="btn-flow">Open Flow Tab</button>
    <button class="btn" id="btn-token">Refresh Token</button>
  </div>

  <!-- Signature -->
  <div class="signature">
    <a href="https://github.com/kodelyx/Flow-Agent-Studio" target="_blank">
      <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor" style="vertical-align:-2px;margin-right:3px">
        <path
          d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z" />
      </svg>Flow Agent</a> · built by <a href="https://github.com/kodelyx/Flow-Agent-Studio" target="_blank">kodelyx</a>
  </div>

  <!-- Detail overlay -->
  <div class="detail-overlay" id="detail-overlay">
    <div class="detail-panel">
      <div class="detail-header">
        <span id="detail-title">Request Detail</span>
        <button class="detail-close" id="detail-close">&times;</button>
      </div>
      <div class="detail-body" id="detail-body"></div>
    </div>
  </div>

  <!-- Toasts -->
  <div id="toast-wrap"></div>

  <script src="side_panel.js"></script>
</body>

</html>
